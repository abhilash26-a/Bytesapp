name: Backfill Unenriched Stories

on:
  workflow_dispatch: {}  # Manual trigger only

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Backfill unenriched stories
        working-directory: pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py --backfill-unenriched

      - name: Commit and push
        run: |
          git config user.name "Bytes Bot"
          git config user.email "bot@bytes.app"
          git add data/
          git diff --staged --quiet || git commit -m "Backfill unenriched stories $(date -u +%Y-%m-%d_%H:%M)"
          git push
