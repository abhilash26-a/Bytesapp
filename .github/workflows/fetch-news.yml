name: Fetch News

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours — 8 runs/day for fresh news
  workflow_dispatch: {}       # Manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run news pipeline
        working-directory: pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Commit and push updated stories
        run: |
          git config user.name "Bytes Bot"
          git config user.email "bot@bytes.app"
          git add data/
          git diff --staged --quiet || git commit -m "Update stories $(date -u +%Y-%m-%d_%H:%M)"
          git push
