name: Regenerate All Enriched Stories

on:
  workflow_dispatch: {}

jobs:
  regenerate-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 350  # ~6 hours max — 554 stories × 8s ≈ 75 min nominal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Regenerate all enriched stories
        working-directory: pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -u fetch_news.py --regenerate-all-enriched

      - name: Commit and push
        run: |
          git config user.name "Bytes Bot"
          git config user.email "bot@bytes.app"
          git add data/
          git diff --staged --quiet || git commit -m "Regenerate all 554 enriched stories with new prompt + schema"
          git push
